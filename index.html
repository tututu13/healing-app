<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WABCO 心理韧性急救包</title>
<style>
  body { 
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
    background-color: #f0f4f8; 
    color: #333; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }
  .card { 
    background: #ffffff; 
    padding: 40px; 
    border-radius: 16px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
    max-width: 600px; 
    width: 100%; 
    position: relative;
  }
  h1 { 
    color: #4a90e2; 
    font-size: 24px; 
    text-align: center;
    margin-bottom: 10px; 
  }
  .subtitle {
    text-align: center;
    color: #777;
    margin-bottom: 30px;
    font-size: 14px;
  }
  .step-indicator {
    font-weight: bold;
    color: #4a90e2;
    margin-bottom: 15px;
    font-size: 18px;
  }
  .question-text { 
    font-size: 18px; 
    line-height: 1.6; 
    margin-bottom: 20px; 
    font-weight: bold;
  }
  .desc-text {
    font-size: 14px;
    color: #666;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  textarea {
    width: 100%;
    height: 120px;
    padding: 15px;
    border: 2px solid #e1e4e8;
    border-radius: 10px;
    font-size: 16px;
    resize: none;
    box-sizing: border-box;
    margin-bottom: 20px;
    font-family: inherit;
  }
  textarea:focus {
    outline: none;
    border-color: #4a90e2;
  }
  .btn { 
    display: block; 
    width: 100%; 
    padding: 15px; 
    border: none; 
    border-radius: 10px; 
    background: #4a90e2; 
    color: #fff; 
    font-size: 18px; 
    font-weight: bold;
    cursor: pointer; 
    transition: background 0.3s; 
  }
  .btn:hover { 
    background: #357abd; 
  }
  /* 最后的报告样式 */
  .report-box {
    display: none;
  }
  .report-item {
    background: #f9fbfd;
    border-left: 4px solid #4a90e2;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 4px;
  }
  .report-item h3 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: #4a90e2;
  }
  .report-item p {
    margin: 0;
    font-size: 15px;
    color: #444;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<div class="card">
  <h1>🛡️ WABCO 心理韧性急救包</h1>
  <p class="subtitle">面对突如其来的挑战，感到震惊和不知所措是正常的。暂且忍耐一下这种不舒服的感觉，让我们一步步来。</p>
  
  <div id="step-container">
    <div class="step-indicator" id="step-id">步骤 1 / 5</div>
    <div class="question-text" id="question-text">W (Write) - 写下来</div>
    <div class="desc-text" id="desc-text">弄清楚你恐惧的具体是什么？把你面对的麻烦和内心的害怕都写在这里。</div>
    <textarea id="user-input" placeholder="输入你的想法..."></textarea>
    <button class="btn" id="next-btn" onclick="nextStep()">下一步</button>
  </div>

  <div id="report-container" class="report-box">
    <div class="question-text" style="text-align: center;">✅ 你的心理韧性应对方案已生成</div>
    <div class="desc-text" style="text-align: center;">承认并共情你充满恐惧的那个部分，它才能得到疗愈。现在，请按照以下你亲自制定的步骤去行动吧：</div>
    <div id="report-content"></div>
    <button class="btn" style="margin-top:20px;" onclick="location.reload()">重新开启练习</button>
  </div>

</div>

<script>
  // WABCO 五步法的内容配置
  const steps = [
    {
      letter: "W (Write) - 写下来",
      desc: "把问题写下来，弄清楚你恐惧的具体是什么？把你面对的麻烦和内心的害怕都写在这里。",
      placeholder: "我现在的困境是... 我真正害怕发生的是..."
    },
    {
      letter: "A (Ask) - 寻求",
      desc: "根据你的需要寻求帮助。谁能在这件事上给你情感支持或实用建议？",
      placeholder: "我可以向___寻求帮助，我需要他们帮我..."
    },
    {
      letter: "B (Break) - 分解",
      desc: "将问题分解成几个部分。不要试图一次解决所有麻烦，第一步、第二步分别可以做什么？",
      placeholder: "1. 我今天能做的第一件小事是...\n2. 接下来我可以..."
    },
    {
      letter: "C (Curb) - 抑制",
      desc: "抑制自我批评的欲望。世上没有完美的人，不要在此时评判自己。写下一句安抚“内在小孩”的话。",
      placeholder: "我不会因为感到害怕而羞愧，因为..."
    },
    {
      letter: "O (Optimistically) - 乐观",
      desc: "乐观地想象解决问题后你会有什么感觉。这会让你立刻平静下来。",
      placeholder: "当这一切过去后，我会感到..."
    }
  ];

  let currentStep = 0;
  const userAnswers = [];

  const stepIdEl = document.getElementById('step-id');
  const questionEl = document.getElementById('question-text');
  const descEl = document.getElementById('desc-text');
  const inputEl = document.getElementById('user-input');
  const stepContainer = document.getElementById('step-container');
  const reportContainer = document.getElementById('report-container');
  const reportContent = document.getElementById('report-content');

  function initStep() {
    stepIdEl.innerText = `步骤 ${currentStep + 1} / 5`;
    questionEl.innerText = steps[currentStep].letter;
    descEl.innerText = steps[currentStep].desc;
    inputEl.value = '';
    inputEl.placeholder = steps[currentStep].placeholder;
    if(currentStep === 4) {
      document.getElementById('next-btn').innerText = '生成我的应对方案';
    }
  }

  function nextStep() {
    const answer = inputEl.value.trim();
    if(!answer) {
      alert("请写下一点你的想法，这会帮助你整理思绪哦。");
      return;
    }
    
    userAnswers.push({
      title: steps[currentStep].letter,
      content: answer
    });

    currentStep++;
    
    if(currentStep < 5) {
      initStep();
    } else {
      showReport();
    }
  }

  function showReport() {
    stepContainer.style.display = 'none';
    reportContainer.style.display = 'block';
    
    let html = '';
    userAnswers.forEach(ans => {
      html += `
        <div class="report-item">
          <h3>${ans.title}</h3>
          <p>${ans.content}</p>
        </div>
      `;
    });
    reportContent.innerHTML = html;
  }

  // 初始化第一步
  initStep();
</script>
</body>
</html>
