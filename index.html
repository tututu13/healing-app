<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超越童年创伤 - 12项深度疗愈日志</title>
<style>
  body { font-family: 'PingFang SC', serif; background-color: #f7f5f0; color: #3a3a3a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
  .journal-card { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); max-width: 700px; width: 100%; border-top: 6px solid #b89b82; }
  h1 { color: #8c735a; text-align: center; margin-bottom: 10px; }
  .subtitle { text-align: center; color: #777; margin-bottom: 30px; font-size: 15px; }
  
  /* 首页菜单网格 */
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
  .chapter-btn { background: #fdfaf6; border: 2px solid #eae5d9; padding: 20px; border-radius: 8px; text-align: left; font-size: 16px; color: #555; cursor: pointer; transition: 0.3s; font-weight: bold;}
  .chapter-btn:hover:not(:disabled) { background: #f4eee6; border-color: #b89b82; color: #8c735a; transform: translateY(-2px); }
  .chapter-btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; border-color: #ddd;}
  
  /* 问答区样式 */
  .q-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #4a4a4a; }
  .q-desc { font-size: 16px; color: #666; line-height: 1.6; margin-bottom: 25px; }
  .dynamic-text { color: #b89b82; font-weight: bold; background: #fdfaf6; padding: 2px 6px; border-radius: 4px; }
  textarea, input[type="text"] { width: 100%; padding: 15px; border: 1px solid #dcdcdc; border-radius: 6px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; background-color: #faf9f7; line-height: 1.5;}
  textarea { height: 120px; resize: none; }
  textarea:focus, input[type="text"]:focus { outline: none; border-color: #b89b82; background-color: #fff; }
  .btn { width: 100%; padding: 16px; border: none; border-radius: 6px; background: #8c735a; color: #fff; font-size: 17px; cursor: pointer; margin-bottom: 15px; }
  .btn:hover { background: #735c46; }
  .btn-outline { background: transparent; color: #8c735a; border: 1px solid #8c735a; }
  .back-btn { background: none; border: none; color: #b89b82; cursor: pointer; font-size: 15px; margin-bottom: 20px; text-decoration: underline; }
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<!-- 引入你即将创建的数据文件 -->
<script src="data.js"></script>
</head>
<body>

<div class="journal-card">
  <!-- 首页：章节选择菜单 -->
  <div id="home-view">
    <h1>12项深度疗愈日志</h1>
    <p class="subtitle">请选择你今天想要探索并夺回的生命权利</p>
    <div class="grid" id="chapter-grid"></div>
  </div>

  <!-- 问答页：深度交互引擎 -->
  <div id="journal-view" style="display:none;">
    <button class="back-btn" onclick="goHome()">← 返回目录</button>
    <h2 id="chapter-title" style="color:#8c735a; border-bottom:1px solid #eee; padding-bottom:10px;"></h2>
    <div id="step-container">
      <div class="q-title" id="q-title"></div>
      <div class="q-desc" id="q-desc"></div>
      <div id="input-container"></div>
      <button class="btn" id="next-btn" onclick="nextStep()">下一步</button>
    </div>
    <!-- 专属疗愈报告 -->
    <div id="report-container" style="display:none; text-align:center;">
      <h2 style="color:#8c735a;">✨ 你的更高自我正在为你鼓掌！</h2>
      <p style="color:#666; margin-bottom:30px;">它站起来鼓掌，冲你吹口哨！因为你找回了讲述自己生命故事的权利。</p>
      <button class="btn" onclick="goHome()">完成练习，返回主页</button>
    </div>
  </div>
</div>

<script>
  let memory = {};
  let currentChapter = null;
  let currentStepIndex = 0;

  // 1. 渲染首页网格
  window.onload = () => {
    const grid = document.getElementById('chapter-grid');
    for(let i=1; i<=12; i++) {
      const btn = document.createElement('button');
      btn.className = 'chapter-btn';
      if(window.bookData && window.bookData[i]) {
        btn.innerHTML = window.bookData[i].title;
        btn.onclick = () => startChapter(i);
      } else {
        btn.innerHTML = `第 ${i} 章 <br><span style="font-size:13px; font-weight:normal;">(系统升级中，敬请期待)</span>`;
        btn.disabled = true;
      }
      grid.appendChild(btn);
    }
  };

  function goHome() {
    document.getElementById('journal-view').style.display = 'none';
    document.getElementById('report-container').style.display = 'none';
    document.getElementById('step-container').style.display = 'block';
    document.getElementById('home-view').style.display = 'block';
  }

  function startChapter(id) {
    currentChapter = window.bookData[id];
    memory = {}; // 清空上一次的记忆
    currentStepIndex = 0;
    document.getElementById('home-view').style.display = 'none';
    document.getElementById('journal-view').style.display = 'block';
    document.getElementById('chapter-title').innerText = currentChapter.title;
    renderStep();
  }

  function renderStep() {
    const step = currentChapter.steps[currentStepIndex];
    document.getElementById('q-title').innerText = step.title;
    document.getElementById('q-desc').innerHTML = typeof step.desc === 'function' ? step.desc(memory) : step.desc;
    
    const inputContainer = document.getElementById('input-container');
    const nextBtn = document.getElementById('next-btn');
    inputContainer.innerHTML = '';
    
    if (step.isChoice) {
      nextBtn.style.display = 'none';
      step.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = choice.isGrowth ? 'btn' : 'btn btn-outline';
        btn.innerText = choice.text;
        btn.onclick = () => handleChoice(choice.isGrowth);
        inputContainer.appendChild(btn);
      });
    } else {
      nextBtn.style.display = 'block';
      step.inputs.forEach(input => {
        let field = document.createElement(input.type === 'textarea' ? 'textarea' : 'input');
        if(input.type !== 'textarea') field.type = 'text';
        field.id = `input-${input.key}`;
        field.placeholder = input.placeholder;
        if(memory[input.key]) field.value = memory[input.key];
        inputContainer.appendChild(field);
      });
    }
  }

  function nextStep() {
    const step = currentChapter.steps[currentStepIndex];
    for (let input of step.inputs) {
      const val = document.getElementById(`input-${input.key}`).value.trim();
      if (!val) return alert("请写下一点你的真实想法，这对深入疗愈非常重要。");
      memory[input.key] = val;
    }
    currentStepIndex++;
    renderStep();
  }

  function handleChoice(isGrowth) {
    if (isGrowth) {
      confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#8c735a', '#b89b82', '#ffd700'] });
      setTimeout(() => { 
        document.getElementById('step-container').style.display = 'none';
        document.getElementById('report-container').style.display = 'block';
      }, 1000);
    } else {
      alert("没关系，停滞也是一种暂时的自我保护。准备好时，随时回来。");
      goHome();
    }
  }
</script>
</body>
</html>
